name: publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          echo "//registry.npmjs.org/:_authToken=${TOKEN}" > ~/.npmrc
          npm whoami
          npm publish
        env:
          TOKEN: ${{ secrets.NPM_TOKEN }}
